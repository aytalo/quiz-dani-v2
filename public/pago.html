<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Conversa com a Dani 🎡</title>
  <meta name="description" content="Diagnóstico rápido do seu jogo na Roleta." />
  <link rel="icon" type="image/jpeg" href="/dani.jpg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">

  <!-- ─── Captura UTMs / fbclid / kwai_click_id / gclid logo no carregamento ─── -->
  <script>
    (function () {
      try {
        const url = new URL(window.location.href);
        const stored = JSON.parse(sessionStorage.getItem('tracking') || '{}');
        const keys = [
          'utm_source','utm_medium','utm_campaign','utm_content','utm_term','utm_id',
          'fbclid','kwai_click_id','clickid','gclid','ttclid','src','ref','aff_link'
        ];
        const novos = {};
        for (const k of keys) {
          const v = url.searchParams.get(k);
          if (v) novos[k] = v;
        }
        const merged = { ...stored, ...novos, _captured_at: Date.now(), _landing: url.pathname + url.search };
        if (!stored._referrer) merged._referrer = document.referrer || null;
        sessionStorage.setItem('tracking', JSON.stringify(merged));
        localStorage.setItem('tracking', JSON.stringify(merged));
        window.__TRACKING__ = merged;

        if (typeof window.fbq === 'function') window.fbq('track', 'PageView');
      } catch (e) { console.error('tracking init:', e); }
    })();
  </script>
</head>
<body>
  <div class="phone">
    <div class="phone-status">
      <span class="status-time" id="statusTime">22:47</span>
      <span class="status-icons">
        <svg width="16" height="11" viewBox="0 0 16 11" fill="none"><path d="M0 8h2v3H0V8zm4-2h2v5H4V6zm4-3h2v8H8V3zm4-3h2v11h-2V0z" fill="currentColor"/></svg>
        <svg width="14" height="11" viewBox="0 0 14 11" fill="none"><path d="M7 0C4.3 0 2 2.3 2 5h2c0-1.7 1.3-3 3-3s3 1.3 3 3h2c0-2.7-2.3-5-5-5z" fill="currentColor"/></svg>
        <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="1" y="1" width="18" height="9" rx="2" stroke="currentColor"/><rect x="3" y="3" width="14" height="5" rx="1" fill="currentColor"/></svg>
      </span>
    </div>

    <div class="phone-header">
      <button class="back" aria-label="voltar">‹</button>
      <div class="contact">
        <div class="avatar">
          <span class="avatar-fallback">D</span>
          <img src="/dani.jpg?v=2" alt="Dani"
               onerror="this.style.display='none'" onload="this.style.position='relative';this.style.zIndex='1';this.previousElementSibling.style.display='none';this.style.display='block';" />
          <span class="online-dot"></span>
        </div>
        <div class="contact-info">
          <div class="contact-name">Dani 🎡</div>
          <div class="contact-status" id="contactStatus">online</div>
        </div>
      </div>
      <button class="call" aria-label="ligar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 15.5c-1.25 0-2.45-.2-3.57-.57-.35-.11-.74-.03-1.02.24l-2.2 2.2c-2.83-1.44-5.15-3.75-6.59-6.59l2.2-2.21c.28-.27.36-.66.25-1.01C8.7 6.45 8.5 5.25 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.5c0-.55-.45-1-1-1z" fill="currentColor"/></svg>
      </button>
    </div>

    <div class="chat" id="chat">
      <div class="day-divider"><span>Hoje</span></div>
    </div>

    <div class="phone-input">
      <button class="emoji-btn">😊</button>
      <div class="input-box" id="inputBox">
        <span id="inputText">Toque numa resposta acima…</span>
      </div>
      <button class="send-btn">🎤</button>
    </div>
  </div>

  <script src="/quiz-pago.js"></script>
</body>
</html>
